# clean up github actions runner
on:
  workflow_dispatch:
  push:
concurrency:
  group: ${{ github.workflow }}-${{ github.ref || github.run_id }}
  cancel-in-progress: true
name: Clean up GitHub Actions self-hosted GPU runner
jobs:
  cleanup:
    name: Clean up GitHub Actions self-hosted GPU runner
    runs-on: gpu
    steps:
    - name: See GPU information
      run: nvidia-smi
    - run: ls /dev/nvidia* /usr/lib/x86_64-linux-gnu/libcuda* /usr/lib/x86_64-linux-gnu/libnvidia*
    - run: which apt
