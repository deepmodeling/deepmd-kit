name: dpa_adapt Tests

on:
  push:
    paths:
      - "dpa_adapt/**"
      - "source/tests/dpa_adapt/**"
      - ".github/workflows/dpa_adapt_tests.yml"
  pull_request:
    paths:
      - "dpa_adapt/**"
      - "source/tests/dpa_adapt/**"
      - ".github/workflows/dpa_adapt_tests.yml"

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install lightweight test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install "numpy>=1.21,<2.2" pytest scikit-learn dpdata
          python -m pip install torch --index-url https://download.pytorch.org/whl/cpu

      - name: Prepare source-tree version module
        run: |
          python -c "from pathlib import Path; Path('deepmd/_version.py').write_text('version = \\\"0+unknown\\\"\\n')"

      - name: Run unit tests
        run: |
          python -m pytest source/tests/dpa_adapt/ -v --ignore=source/tests/dpa_adapt/test_trainer_dim_case_embd.py
