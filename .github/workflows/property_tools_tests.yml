name: DeePMD Property Tools Tests

on:
  push:
    paths:
      - "deepmd/dpa_tools/**"
      - "source/tests/dpa_tools/**"
      - ".github/workflows/property_tools_tests.yml"
  pull_request:
    paths:
      - "deepmd/dpa_tools/**"
      - "source/tests/dpa_tools/**"
      - ".github/workflows/property_tools_tests.yml"

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install lightweight test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install numpy pytest scikit-learn dpdata torch --index-url https://download.pytorch.org/whl/cpu

      - name: Run unit tests
        run: |
          python -m pytest source/tests/dpa_tools/ -v --ignore=source/tests/dpa_tools/test_trainer_dim_case_embd.py
